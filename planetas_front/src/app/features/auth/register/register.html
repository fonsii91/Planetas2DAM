<div class="auth-page-wrapper">
    <mat-card class="battle-card orange-glow">
        <mat-card-header>
            <mat-card-title class="tech-title orange-text">REGISTRO SECTORIAL</mat-card-title>
            <mat-card-subtitle class="tech-subtitle">Ingresa en la Alianza</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="battle-form">
                
                <mat-form-field appearance="outline">
                    <mat-label>Nombre</mat-label>
                    <input matInput formControlName="name" placeholder="Tu nombre real">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Apellidos</mat-label>
                    <input matInput formControlName="apellidos" placeholder="Tus apellidos">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email" type="email" placeholder="ejemplo@correo.com">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Nickname Solicitado</mat-label>
                    <input matInput formControlName="nickname" placeholder="Elige un alias único">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Contraseña Maestra</mat-label>
                    <input matInput type="password" formControlName="password" placeholder="Min. 4 Caracteres">
                </mat-form-field>

                <button mat-flat-button class="btn-orange" type="submit" [disabled]="registerForm.invalid">
                    REGISTRAR Y CONECTAR
                </button>
            </form>

            <div class="auth-footer">
                <span style="color: rgba(255,255,255,0.7)">¿Ya perteneces a la facción? </span>
                <a routerLink="/login" class="link-orange">Ir a Terminal de Acceso</a>
            </div>
        </mat-card-content>
    </mat-card>
</div>
